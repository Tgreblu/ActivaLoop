<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActivaLoop</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex; flex-direction: column; gap: 12px;
            align-items: center; justify-content: center; z-index: 50;
            transition: opacity 0.4s;
        }
        .details-summary::-webkit-details-marker { display: none; }
        .details-summary { list-style: none; }

        /* BUG FIX #8: wake lock indicator */
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* Completion overlay animation */
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes checkPop {
            0%   { transform: scale(0); }
            60%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .completion-card { animation: slideUp 0.4s ease forwards; }
        .completion-check { animation: checkPop 0.5s ease 0.2s both; }

        /* Error banner */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        .error-banner { animation: slideDown 0.3s ease forwards; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-start min-h-screen p-4 sm:p-8">

    <div id="main-wrapper" class="w-full max-w-[600px] space-y-4">

        <div id="loading-overlay">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p id="loading-text" class="text-gray-600">Avvio applicazione...</p>
        </div>

        <!-- Toast errori globali -->
        <div id="error-toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm px-4">
            <div class="error-banner bg-red-600 text-white px-4 py-3 rounded-lg shadow-lg flex items-center justify-between gap-3">
                <span id="error-toast-text" class="text-sm"></span>
                <button onclick="document.getElementById('error-toast').classList.add('hidden')" class="flex-shrink-0 text-white/80 hover:text-white">
                    <!-- FIX #2: viewBox corretto "0 0 24 24" -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>

        <!-- Timer -->
        <div id="timer-block" class="bg-white rounded-2xl shadow-xl p-10 border border-gray-200 relative overflow-hidden">
            <div id="auth-container" class="absolute top-4 right-4 text-sm z-10"></div>
            <div class="text-center">
                <h1 id="exercise-title" class="text-3xl font-bold text-gray-800 min-h-[5rem] flex items-center justify-center">ActivaLoop</h1>
                <div id="countdown-container" class="my-2 min-h-[5rem] flex items-center justify-center flex-col">
                    <p id="countdown-display" class="text-7xl font-bold text-blue-600 tabular-nums">00:00</p>
                </div>
                <div class="flex justify-center items-center space-x-4 mb-2">
                    <!-- FIX #2: viewBox "0 0 24 24" -->
                    <button id="back-btn" class="p-3 rounded-full bg-gray-200 hover:bg-gray-300 text-gray-700 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <button id="start-pause-btn" class="w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md">START</button>
                    <button id="next-btn" class="p-3 rounded-full bg-gray-200 hover:bg-gray-300 text-gray-700 transition-all duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                </div>
                <p class="text-sm text-gray-500 h-5">Prossimo: <span id="next-exercise-label"></span></p>
            </div>
        </div>

        <!-- Sequenze -->
        <div id="sequences-block" class="bg-white rounded-2xl shadow-xl p-6 border border-gray-200 relative">
            <div id="sequences-container" class="space-y-2"></div>
            <div class="flex justify-center mt-4">
                <button id="add-sequence-btn" class="bg-blue-600 text-white rounded-full p-2 hover:bg-blue-700 shadow-lg transition z-10">
                    <!-- FIX #2: viewBox "0 0 24 24" -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth, signInAnonymously, onAuthStateChanged,
            GoogleAuthProvider, signInWithPopup, signOut,
            linkWithPopup  // FIX #1: rimosso linkWithCredential (non usato), usato linkWithPopup
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore, collection, doc, onSnapshot, addDoc,
            updateDoc, deleteDoc, serverTimestamp, writeBatch,
            setDoc, getDocs, query, orderBy
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const GOOGLE_CLIENT_ID = "508054707957-lb81rgk20vk0vr7bkkufsd83m80l5338.apps.googleusercontent.com";
        const GOOGLE_API_KEY   = "AIzaSyAoSqwkSoatQLABaTL17EnU4pA40kcWonY";

        const firebaseConfig = {
            apiKey: GOOGLE_API_KEY,
            authDomain: "activaloop.firebaseapp.com",
            projectId: "activaloop",
            storageBucket: "activaloop.firebasestorage.app",
            messagingSenderId: "5835049539",
            appId: "1:5835049539:web:2f21359a22019414a762f6"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        let userId = null;
        let unsubscribeFromSequences;
        let unsubscribeFromGlobalSettings;
        let exerciseUnsubscribers = new Map();

        let tokenClient;
        let eventDetailsToSave = null;
        let preferredCalendarId = 'primary';
        let gapiReady = false;
        let gisReady  = false;

        // FIX #9: flag per evitare loop migrazione
        let isMigrating = false;

        // ─── Utilità ──────────────────────────────────────────────────────────

        const toLocalISOString = (date) => {
            const tzo = -date.getTimezoneOffset();
            const dif = tzo >= 0 ? '+' : '-';
            const pad = n => (n < 10 ? '0' : '') + n;
            return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}${dif}${pad(Math.floor(Math.abs(tzo)/60))}:${pad(Math.abs(tzo)%60)}`;
        };

        const showErrorToast = (message, duration = 5000) => {
            const toast   = document.getElementById('error-toast');
            const textEl  = document.getElementById('error-toast-text');
            textEl.textContent = message;
            toast.classList.remove('hidden');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.add('hidden'), duration);
        };

        const loadScript = src => new Promise((resolve, reject) => {
            if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
            const s = document.createElement('script');
            s.src = s.async = s.defer = src; // simpler
            s.src   = src;
            s.async = true;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
        });

        // FIX #3: Suono di fine via Web Audio API (no base64 corrotto)
        const playEndSound = () => {
            try {
                const ctx  = new (window.AudioContext || window.webkitAudioContext)();
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.6);
            } catch (e) {
                console.warn('Audio non disponibile:', e);
            }
        };

        const ensureCalendarReady = async () => {
            if (!gapiReady) throw new Error("GAPI non inizializzata");
            if (!gapi.client.calendar) await gapi.client.load('calendar', 'v3');
        };

        const initializeGoogleApis = async () => {
            try {
                await loadScript('https://apis.google.com/js/api.js');
                await new Promise(resolve => gapi.load('client', resolve));
                try {
                    await gapi.client.init({
                        apiKey: GOOGLE_API_KEY,
                        discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
                    });
                    await gapi.client.load('calendar', 'v3');
                    gapiReady = true;
                } catch (err) {
                    console.error("Errore GAPI init:", err);
                }

                await loadScript('https://accounts.google.com/gsi/client');
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly',
                    callback: async (tokenResponse) => {
                        if (tokenResponse?.error) {
                            showErrorToast("Errore autorizzazione Google: " + tokenResponse.error);
                            return;
                        }
                        if (tokenResponse?.access_token) {
                            gapi.client.setToken({ access_token: tokenResponse.access_token });
                            if (eventDetailsToSave) {
                                try {
                                    await ensureCalendarReady();
                                    if (eventDetailsToSave.isAuto && preferredCalendarId) {
                                        createCalendarEvent(preferredCalendarId, eventDetailsToSave);
                                    } else {
                                        listUserCalendars();
                                    }
                                } catch (err) {
                                    showErrorToast("Errore Google Calendar: " + err.message);
                                }
                            }
                        }
                    },
                });
                gisReady = true;
            } catch (error) {
                console.error("Errore init Google APIs:", error);
            }
        };

        // ─── DOM Ready ────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {

            const authContainer    = document.getElementById('auth-container');
            const titleEl          = document.getElementById('exercise-title');
            const countdownContainer = document.getElementById('countdown-container');
            const startPauseBtn    = document.getElementById('start-pause-btn');
            const nextBtn          = document.getElementById('next-btn');
            const backBtn          = document.getElementById('back-btn');
            const nextExerciseLabel = document.getElementById('next-exercise-label');
            const sequencesContainer = document.getElementById('sequences-container');
            const addSequenceBtn   = document.getElementById('add-sequence-btn');
            const loadingOverlay   = document.getElementById('loading-overlay');
            const loadingText      = document.getElementById('loading-text');

            let allSequences         = [];
            let currentExerciseIndex = 0;
            let timeLeft             = 0;
            let timerInterval        = null;
            let isPaused             = true;
            let isBreakTime          = false;
            let commentTimeout       = null;
            let wakeLock             = null;
            // FIX #4: flag per evitare doppio setupExercise al primo start
            let exerciseInitialized  = false;

            // FIX #2: SVG viewBox corretti "0 0 24 24"
            const pencilIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`;
            const checkIcon  = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            const trashIcon  = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
            const arrowUpIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>`;
            const arrowDownIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`;

            // ─── Wake Lock ─────────────────────────────────────────────────

            const requestWakeLock = async () => {
                if (!('wakeLock' in navigator)) return;
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    // FIX #8: gestione auto-release del browser
                    wakeLock.addEventListener('release', () => {
                        wakeLock = null;
                    });
                } catch (err) {
                    console.warn('Wake Lock non ottenuto:', err.name, err.message);
                }
            };

            const releaseWakeLock = async () => {
                if (wakeLock !== null) {
                    try { await wakeLock.release(); } catch (_) {}
                    wakeLock = null;
                }
            };

            // FIX #8: richiedi wake lock quando la pagina torna visibile e il timer gira
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState === 'visible' && !isPaused) {
                    await requestWakeLock();
                }
            });

            // ─── Auth UI ───────────────────────────────────────────────────

            const updateAuthUI = (user) => {
                authContainer.innerHTML = '';
                if (user && !user.isAnonymous) {
                    authContainer.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span class="text-gray-600">Ciao, ${user.displayName.split(' ')[0]}</span>
                            <button id="logout-btn" class="font-semibold text-blue-600 hover:underline">Esci</button>
                        </div>`;
                    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth).catch(e => showErrorToast("Errore logout: " + e.message)));
                } else {
                    authContainer.innerHTML = `<button id="login-btn" class="bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded-md hover:bg-gray-50">Accedi con Google</button>`;
                    document.getElementById('login-btn').addEventListener('click', signInWithGoogle);
                }
            };

            // FIX #1: signInWithGoogle corretto — usa linkWithPopup per utenti anonimi
            const signInWithGoogle = async () => {
                const provider     = new GoogleAuthProvider();
                const currentUser  = auth.currentUser;
                try {
                    if (currentUser && currentUser.isAnonymous) {
                        await linkWithPopup(currentUser, provider);
                    } else {
                        await signInWithPopup(auth, provider);
                    }
                } catch (error) {
                    // Se le credenziali sono già in uso, fai sign-in normale
                    if (error.code === 'auth/credential-already-in-use') {
                        try { await signInWithPopup(auth, provider); } catch (e) {
                            showErrorToast("Errore accesso Google: " + e.message);
                        }
                    } else {
                        showErrorToast("Errore accesso Google: " + error.message);
                    }
                }
            };

            // ─── Timer & UI ────────────────────────────────────────────────

            const formatTime = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

            const getActiveSequence = () => allSequences.find(s => s.isActive);

            const getCountdownDisplay = () => document.getElementById('countdown-display');

            const resetTimerUI = () => {
                countdownContainer.innerHTML = `<p id="countdown-display" class="text-7xl font-bold text-blue-600 tabular-nums">${formatTime(0)}</p>`;
                exerciseInitialized = false;
                updateUI();
            };

            const updateUI = () => {
                const activeSequence = getActiveSequence();
                const cd = getCountdownDisplay();
                if (!cd) return;

                if (!activeSequence || !activeSequence.exercises?.length) {
                    titleEl.textContent = activeSequence?.title || "ActivaLoop";
                    cd.textContent = formatTime(0);
                    nextExerciseLabel.textContent = "";
                    startPauseBtn.textContent = 'START';
                    startPauseBtn.className = "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md";
                    backBtn.style.visibility = 'hidden';
                    nextBtn.style.visibility = 'hidden';
                    return;
                }

                const exercises = activeSequence.exercises;

                if (isBreakTime) {
                    titleEl.textContent = "Pausa";
                    cd.className = "text-7xl font-bold text-green-600 tabular-nums";
                    nextExerciseLabel.textContent = exercises[currentExerciseIndex + 1]?.title || 'Ricomincia';
                } else {
                    const exercise = exercises[currentExerciseIndex];
                    if (!exercise) return;
                    titleEl.textContent = exercise.title;
                    cd.className = "text-7xl font-bold text-blue-600 tabular-nums";
                    nextExerciseLabel.textContent = exercises[currentExerciseIndex + 1]?.title || '';
                }

                cd.textContent = formatTime(Math.max(0, timeLeft));

                startPauseBtn.textContent = isPaused ? 'START' : 'PAUSE';
                startPauseBtn.className = isPaused
                    ? "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md"
                    : "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-gray-500 text-white hover:bg-gray-600 transition-all duration-200 shadow-md";

                backBtn.style.visibility = currentExerciseIndex > 0 ? 'visible' : 'hidden';
                nextBtn.style.visibility = currentExerciseIndex < exercises.length - 1 ? 'visible' : 'hidden';
            };

            const speakText = (text) => {
                if (!('speechSynthesis' in window) || !text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'it-IT';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            const setupExercise = (index, shouldSpeak = false) => {
                const activeSequence = getActiveSequence();
                if (!activeSequence?.exercises?.length) return;

                // FIX #7: clamp indice fuori bounds
                index = Math.max(0, Math.min(index, activeSequence.exercises.length - 1));

                window.speechSynthesis.cancel();
                if (commentTimeout) clearTimeout(commentTimeout);

                isBreakTime = false;
                currentExerciseIndex = index;
                exerciseInitialized  = true;

                const currentExercise = activeSequence.exercises[currentExerciseIndex];
                timeLeft = currentExercise?.duration || 0;

                // Ricostruisce il countdown display se mancante (es. dopo completion card)
                if (!getCountdownDisplay()) {
                    countdownContainer.innerHTML = `<p id="countdown-display" class="text-7xl font-bold text-blue-600 tabular-nums">${formatTime(0)}</p>`;
                }

                updateUI();

                if (shouldSpeak && activeSequence.settings.speechEnabled) {
                    speakText(currentExercise.title);
                    if (activeSequence.settings.commentSpeechEnabled && currentExercise.comment?.trim()) {
                        commentTimeout = setTimeout(() => {
                            if (!isPaused) speakText(currentExercise.comment);
                        }, 3000);
                    }
                }
            };

            const pauseTimer = async () => {
                isPaused = true;
                if (timerInterval) clearInterval(timerInterval);
                if (commentTimeout) clearTimeout(commentTimeout);
                window.speechSynthesis.cancel();
                timerInterval = null;
                await releaseWakeLock();
                updateUI();
            };

            const startTimer = async () => {
                await requestWakeLock();
                const activeSequence = getActiveSequence();
                if (!activeSequence?.exercises?.length) return;

                // FIX #4: setupExercise solo se l'esercizio NON è già stato inizializzato
                // (evita la doppia chiamata tra handleStartPauseClick → startTimer)
                if (!exerciseInitialized) {
                    setupExercise(currentExerciseIndex, true);
                }

                isPaused = false;
                updateUI();

                timerInterval = setInterval(async () => {
                    timeLeft--;
                    const cd = getCountdownDisplay();
                    if (cd) cd.textContent = formatTime(Math.max(0, timeLeft));

                    if (timeLeft < 0) {
                        if (isBreakTime) {
                            setupExercise(currentExerciseIndex + 1, true);
                            // non serve re-impostare interval: rimane attivo
                        } else {
                            playEndSound(); // FIX #3: Web Audio API
                            const exercises = getActiveSequence()?.exercises || [];
                            if (currentExerciseIndex < exercises.length - 1) {
                                isBreakTime = true;
                                timeLeft    = getActiveSequence().settings.breakDuration;
                                updateUI();
                            } else {
                                // Sequenza completata
                                clearInterval(timerInterval);
                                timerInterval = null;
                                await pauseTimer();
                                isBreakTime = false;
                                handleSequenceCompletion(getActiveSequence());
                            }
                        }
                    }
                }, 1000);
            };

            const handleStartPauseClick = async () => {
                const activeSequence = getActiveSequence();
                if (!activeSequence?.exercises?.length) return;

                // Blocca se c'è un accordeon aperto in editing
                if (sequencesContainer.querySelector('details[open]')) return;

                if (isPaused) {
                    // Se siamo alla fine (completato), ricomincia dall'inizio
                    if (!exerciseInitialized || (timeLeft <= 0 && currentExerciseIndex >= activeSequence.exercises.length - 1 && !isBreakTime)) {
                        setupExercise(0, true);
                    }
                    await startTimer();
                } else {
                    await pauseTimer();
                }
            };

            const handleNextClick = async () => {
                if (!getActiveSequence()) return;
                await pauseTimer();
                const exercises = getActiveSequence().exercises;
                if (currentExerciseIndex < exercises.length - 1) {
                    setupExercise(currentExerciseIndex + 1, true);
                }
            };

            const handleBackClick = async () => {
                if (!getActiveSequence()) return;
                await pauseTimer();
                if (currentExerciseIndex > 0) {
                    setupExercise(currentExerciseIndex - 1, true);
                }
            };

            // ─── Completion Feedback (miglioramento UX) ────────────────────

            const handleSequenceCompletion = (sequence) => {
                if (!sequence?.exercises?.length) return;

                // FIX #6: guard contro 0 esercizi
                const exerciseCount  = sequence.exercises.length;
                const breakCount     = Math.max(0, exerciseCount - 1);
                const totalSeconds   = sequence.exercises.reduce((s, ex) => s + (ex.duration || 0), 0)
                                     + breakCount * (sequence.settings.breakDuration || 0);

                const endTime   = new Date();
                const startTime = new Date(endTime.getTime() - totalSeconds * 1000);

                const saveCallback = (isAuto) => handleCalendarSaveRequest(startTime, endTime, sequence.title, isAuto);

                // Scheda completamento animata
                countdownContainer.innerHTML = `
                    <div class="completion-card flex flex-col items-center gap-3 py-2">
                        <div class="completion-check w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <div class="text-center">
                            <p class="text-xl font-bold text-green-700">Completato!</p>
                            <p class="text-sm text-gray-500 mt-1">${exerciseCount} esercizi · ${formatTime(totalSeconds)}</p>
                        </div>
                        <div id="calendar-action" class="mt-1"></div>
                    </div>`;

                titleEl.textContent = sequence.title;

                const calAction = document.getElementById('calendar-action');
                if (sequence.settings.autoCalendarSave) {
                    calAction.innerHTML = `<p class="text-sm text-blue-600 animate-pulse">Salvataggio calendario...</p>`;
                    saveCallback(true);
                } else {
                    calAction.innerHTML = `
                        <div class="flex gap-2">
                            <button id="calendar-btn" class="text-sm font-semibold py-2 px-4 rounded-lg bg-green-600 text-white hover:bg-green-700 transition shadow-md">
                                📅 Salva su Google Calendar
                            </button>
                            <button id="skip-calendar-btn" class="text-sm font-semibold py-2 px-4 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300 transition">
                                Salta
                            </button>
                        </div>`;
                    document.getElementById('calendar-btn').addEventListener('click', () => saveCallback(false));
                    document.getElementById('skip-calendar-btn').addEventListener('click', resetTimerUI);
                }
            };

            // ─── Firestore ─────────────────────────────────────────────────

            const migrateOldData = async () => {
                // FIX #9: flag anti-loop
                if (isMigrating) return;
                isMigrating = true;
                try {
                    loadingText.textContent = "Migrazione dati in corso...";
                    const oldExercisesSnap = await getDocs(collection(db, `users/${userId}/exercises`));
                    const oldSettingsSnap  = await getDocs(collection(db, `users/${userId}/settings`));
                    let oldSettings = {};
                    if (!oldSettingsSnap.empty) oldSettings = oldSettingsSnap.docs[0].data();

                    const newSeqRef = doc(collection(db, `users/${userId}/sequences`));
                    const batch     = writeBatch(db);

                    batch.set(newSeqRef, {
                        title: oldSettings.sequenceTitle || "Sequenza Migrata",
                        isActive: true,
                        createdAt: serverTimestamp(),
                        settings: {
                            speechEnabled:        typeof oldSettings.speechEnabled === 'boolean'        ? oldSettings.speechEnabled        : true,
                            commentSpeechEnabled: typeof oldSettings.commentSpeechEnabled === 'boolean' ? oldSettings.commentSpeechEnabled : true,
                            breakDuration:        typeof oldSettings.breakDuration === 'number'         ? oldSettings.breakDuration        : 5,
                            autoCalendarSave: false
                        }
                    });

                    oldExercisesSnap.docs.forEach(oldDoc => {
                        batch.set(doc(collection(db, newSeqRef.path, 'exercises')), oldDoc.data());
                        batch.delete(oldDoc.ref);
                    });
                    oldSettingsSnap.docs.forEach(d => batch.delete(d.ref));

                    await batch.commit();
                } catch (err) {
                    showErrorToast("Errore migrazione dati: " + err.message);
                    isMigrating = false;
                }
            };

            const setupSequencesListener = () => {
                if (unsubscribeFromSequences) unsubscribeFromSequences();
                const seqRef = collection(db, `users/${userId}/sequences`);

                unsubscribeFromSequences = onSnapshot(
                    query(seqRef, orderBy("createdAt")),
                    async (snapshot) => {
                        if (snapshot.empty) {
                            if (isMigrating) return; // FIX #9: evita loop
                            const oldEx = await getDocs(collection(db, `users/${userId}/exercises`));
                            if (!oldEx.empty) { await migrateOldData(); return; }
                        }

                        const newSequences = snapshot.docs.map(docSnap => ({
                            id: docSnap.id,
                            ...docSnap.data(),
                            exercises: allSequences.find(s => s.id === docSnap.id)?.exercises || [],
                            isEditingTitle: false
                        }));

                        if (newSequences.length > 0 && !newSequences.some(s => s.isActive)) {
                            await handleActivateSequence(newSequences[0].id);
                            return;
                        }

                        allSequences = newSequences;
                        renderSequencesUI();

                        exerciseUnsubscribers.forEach(u => u());
                        exerciseUnsubscribers.clear();
                        allSequences.forEach(seq => setupExercisesListener(seq.id));

                        loadingOverlay.style.opacity = '0';
                        loadingOverlay.style.pointerEvents = 'none';
                    },
                    (err) => {
                        showErrorToast("Errore sincronizzazione: " + err.message);
                        loadingOverlay.style.opacity = '0';
                        loadingOverlay.style.pointerEvents = 'none';
                    }
                );
            };

            const setupGlobalSettingsListener = () => {
                if (unsubscribeFromGlobalSettings) unsubscribeFromGlobalSettings();
                const ref = doc(db, `users/${userId}/settings/main`);
                unsubscribeFromGlobalSettings = onSnapshot(ref, (d) => {
                    if (d.exists()) preferredCalendarId = d.data().preferredCalendarId || 'primary';
                });
            };

            const saveGlobalSetting = async (key, value) => {
                if (!userId) return;
                const ref = doc(db, `users/${userId}/settings/main`);
                await setDoc(ref, { [key]: value }, { merge: true });
            };

            const setupExercisesListener = (sequenceId) => {
                const exRef  = collection(db, `users/${userId}/sequences/${sequenceId}/exercises`);
                const unsub  = onSnapshot(
                    query(exRef, orderBy("order")),
                    (snapshot) => {
                        const sequence = allSequences.find(s => s.id === sequenceId);
                        if (!sequence) return;

                        sequence.exercises = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

                        // FIX #7: clamp indice se alcuni esercizi sono stati eliminati
                        const maxIndex = Math.max(0, sequence.exercises.length - 1);
                        if (currentExerciseIndex > maxIndex) {
                            currentExerciseIndex = maxIndex;
                        }

                        // FIX #10: NON chiamare setupExercise dal listener Firestore.
                        // Aggiorna solo gli elementi UI senza resettare timeLeft.
                        const activeSequence = getActiveSequence();
                        if (activeSequence && activeSequence.id === sequenceId) {
                            // Aggiorna solo il display del titolo/etichetta se in pausa e non avviato
                            if (isPaused && !exerciseInitialized) {
                                updateUI();
                            }
                        }

                        // Aggiorna durata totale nell'header della sequenza
                        const totalDurationEl = document.querySelector(`details[data-sequence-id="${sequenceId}"] .total-duration`);
                        if (totalDurationEl) {
                            const exDur = sequence.exercises.reduce((s, ex) => s + (ex.duration || 0), 0);
                            const brDur = Math.max(0, sequence.exercises.length - 1) * (sequence.settings?.breakDuration || 0);
                            totalDurationEl.textContent = `(${formatTime(exDur + brDur)})`;
                        }

                        // Ri-renderizza la lista esercizi nell'accordion
                        const listEl = document.querySelector(`details[data-sequence-id="${sequenceId}"] .exercise-list`);
                        if (listEl) renderExerciseList(listEl, sequence.exercises);
                    },
                    (err) => showErrorToast("Errore esercizi: " + err.message)
                );
                exerciseUnsubscribers.set(sequenceId, unsub);
            };

            // ─── Rendering UI ─────────────────────────────────────────────

            const renderSequencesUI = () => {
                sequencesContainer.innerHTML = '';
                allSequences.forEach(seq => {
                    const details = document.createElement('details');
                    details.className = 'bg-white rounded-lg border';
                    details.dataset.sequenceId = seq.id;

                    // FIX #2: tutti i viewBox "0 0 24 24"
                    details.innerHTML = `
                        <summary class="details-summary cursor-pointer p-2 text-sm font-medium text-gray-700 list-none flex justify-between items-center bg-gray-100 rounded-t-lg">
                            <div class="flex items-center space-x-2 flex-grow min-w-0">
                                <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
                                    <input type="checkbox" ${seq.isActive ? 'checked' : ''} class="sr-only peer activate-toggle">
                                    <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                                </label>
                                <div class="sequence-title-container flex-grow truncate">
                                    <span class="sequence-title truncate">${seq.title}</span>
                                </div>
                                <span class="total-duration text-xs text-gray-500 font-normal whitespace-nowrap"></span>
                            </div>
                            <div class="flex items-center space-x-2 flex-shrink-0">
                                <button class="edit-title-btn p-1 rounded-full hover:bg-gray-200">${pencilIcon}</button>
                                <svg class="w-4 h-4 transition-transform duration-200 details-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                            </div>
                        </summary>
                        <style>details[open] .details-arrow { transform: rotate(180deg); }</style>

                        <div class="p-3 border-t flex justify-between items-center bg-gray-50">
                            <span class="text-sm font-medium text-red-600">Cancella Sequenza</span>
                            <button class="delete-sequence-btn p-1 rounded-full hover:bg-red-100 text-red-600">${trashIcon}</button>
                        </div>
                        <div class="p-3 border-t flex justify-between items-center bg-gray-50">
                            <label class="text-sm font-medium text-gray-700">Salva nel calendario</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" ${seq.settings.autoCalendarSave ? 'checked' : ''} data-setting="autoCalendarSave" class="sr-only peer setting-toggle">
                                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                        <div class="p-3 border-t flex justify-between items-center bg-gray-50">
                            <label class="text-sm font-medium text-gray-700">Leggi titoli</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" ${seq.settings.speechEnabled ? 'checked' : ''} data-setting="speechEnabled" class="sr-only peer setting-toggle">
                                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                        <div class="p-3 border-t flex justify-between items-center bg-gray-50">
                            <label class="text-sm font-medium text-gray-700">Leggi commenti</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" ${seq.settings.commentSpeechEnabled ? 'checked' : ''} data-setting="commentSpeechEnabled" class="sr-only peer setting-toggle">
                                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </div>
                        <div class="p-3 border-t flex justify-between items-center bg-gray-50">
                            <label class="text-sm font-medium text-gray-700">Pausa (sec)</label>
                            <input type="number" value="${seq.settings.breakDuration}" data-setting="breakDuration" min="5" max="120" class="w-20 p-1 border rounded-md text-sm text-center setting-input">
                        </div>
                        <div class="exercise-list p-3 border-t bg-white"></div>
                        <div class="p-2 border-t bg-gray-100 rounded-b-lg">
                            <button class="add-exercise-btn w-full flex items-center justify-center py-1 text-sm text-blue-600 hover:bg-blue-100 rounded-md">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                <span class="ml-1">Aggiungi Riga</span>
                            </button>
                        </div>`;
                    sequencesContainer.appendChild(details);
                });
            };

            const renderExerciseList = (container, exercises) => {
                container.innerHTML = '';
                exercises.forEach((exercise, index) => {
                    const row = document.createElement('div');
                    row.className = 'flex items-start space-x-1 mb-2';
                    row.dataset.exerciseId = exercise.id;
                    // FIX #2: viewBox "0 0 24 24" in tutti gli SVG inline
                    row.innerHTML = `
                        <div class="flex-grow">
                            <input type="text" value="${exercise.title.replace(/"/g,'&quot;')}" placeholder="Titolo Esercizio" data-field="title" class="w-full p-1 border rounded-md text-sm">
                            <textarea placeholder="Aggiungi un commento..." data-field="comment" class="w-full mt-1 p-1 border rounded-md text-xs h-10 resize-none">${exercise.comment || ''}</textarea>
                        </div>
                        <div class="flex-shrink-0 flex flex-col items-center space-y-1 pt-1">
                            <input type="number" value="${exercise.duration}" data-field="duration" min="1" class="w-16 p-1 border rounded-md text-sm text-center">
                            <div class="flex items-center">
                                <button data-direction="up" class="move-btn p-1 text-gray-500 hover:bg-gray-200 rounded-full" style="${index === 0 ? 'visibility:hidden' : ''}">${arrowUpIcon}</button>
                                <button data-direction="down" class="move-btn p-1 text-gray-500 hover:bg-gray-200 rounded-full" style="${index === exercises.length - 1 ? 'visibility:hidden' : ''}">${arrowDownIcon}</button>
                                <button class="delete-btn p-1 text-red-500 hover:bg-red-100 rounded-full">${trashIcon}</button>
                            </div>
                        </div>`;
                    container.appendChild(row);
                });
            };

            // ─── Settings & CRUD ──────────────────────────────────────────

            const updateSetting = async (sequenceId, settingKey, value) => {
                if (!userId) return;
                try {
                    await updateDoc(doc(db, `users/${userId}/sequences/${sequenceId}`), { [`settings.${settingKey}`]: value });
                } catch (err) {
                    showErrorToast("Errore salvataggio impostazione: " + err.message);
                }
            };

            const handleAddSequence = async () => {
                try {
                    const newSeq = {
                        title: `Nuova Sequenza ${allSequences.length + 1}`,
                        isActive: allSequences.length === 0,
                        createdAt: serverTimestamp(),
                        settings: { speechEnabled: true, commentSpeechEnabled: true, breakDuration: 5, autoCalendarSave: false }
                    };
                    const ref = await addDoc(collection(db, `users/${userId}/sequences`), newSeq);
                    await addDoc(collection(db, ref.path, 'exercises'), {
                        title: 'Primo Esercizio', duration: 10, comment: '', order: 0, createdAt: serverTimestamp()
                    });
                } catch (err) {
                    showErrorToast("Errore creazione sequenza: " + err.message);
                }
            };

            // FIX #5: pauseTimer() prima di cambiare sequenza attiva
            const handleActivateSequence = async (sequenceIdToActivate) => {
                await pauseTimer();
                currentExerciseIndex = 0;
                exerciseInitialized  = false;
                resetTimerUI();

                const batch = writeBatch(db);
                allSequences.forEach(seq => {
                    batch.update(doc(db, `users/${userId}/sequences/${seq.id}`), { isActive: seq.id === sequenceIdToActivate });
                });
                try {
                    await batch.commit();
                } catch (err) {
                    showErrorToast("Errore cambio sequenza: " + err.message);
                }
            };

            const showConfirmationModal = (message, onConfirm) => {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm mx-4">
                        <p class="text-gray-800 mb-4">${message}</p>
                        <div class="flex justify-end space-x-2">
                            <button id="modal-cancel" class="px-4 py-2 rounded-md text-gray-700 bg-gray-200 hover:bg-gray-300">Annulla</button>
                            <button id="modal-confirm" class="px-4 py-2 rounded-md text-white bg-red-600 hover:bg-red-700">Conferma</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                const close = () => document.body.removeChild(modal);
                document.getElementById('modal-confirm').addEventListener('click', () => { onConfirm(); close(); });
                document.getElementById('modal-cancel').addEventListener('click', close);
                modal.addEventListener('click', e => { if (e.target === modal) close(); });
            };

            const handleDeleteSequence = async (sequenceId) => {
                try {
                    const exSnap = await getDocs(collection(db, `users/${userId}/sequences/${sequenceId}/exercises`));
                    const batch  = writeBatch(db);
                    exSnap.docs.forEach(d => batch.delete(d.ref));
                    batch.delete(doc(db, `users/${userId}/sequences/${sequenceId}`));
                    await batch.commit();
                } catch (err) {
                    showErrorToast("Errore eliminazione sequenza: " + err.message);
                }
            };

            // ─── Google Calendar ──────────────────────────────────────────

            const renderSaveErrorUI = (errorMessage, retryCallback) => {
                const calAction = document.getElementById('calendar-action');
                if (!calAction) {
                    showErrorToast(errorMessage);
                    return;
                }
                calAction.innerHTML = `
                    <div class="flex flex-col items-center gap-2">
                        <p class="text-red-600 font-semibold text-sm text-center">${errorMessage}</p>
                        <div class="flex gap-2">
                            <button id="retry-save-btn" class="bg-blue-600 text-white px-4 py-2 rounded shadow text-sm">Riprova</button>
                            <button id="skip-save-btn" class="bg-gray-300 text-gray-700 px-4 py-2 rounded shadow text-sm">Salta</button>
                        </div>
                    </div>`;
                document.getElementById('retry-save-btn').addEventListener('click', retryCallback);
                document.getElementById('skip-save-btn').addEventListener('click', resetTimerUI);
            };

            const handleCalendarSaveRequest = (startTime, endTime, title, isAuto) => {
                eventDetailsToSave = { startTime, endTime, title, isAuto };

                if (!gisReady || !gapiReady) {
                    renderSaveErrorUI("API Google non pronte.", () => handleCalendarSaveRequest(startTime, endTime, title, isAuto));
                    return;
                }

                if (gapi.client.getToken() !== null) {
                    if (isAuto && preferredCalendarId) {
                        createCalendarEvent(preferredCalendarId, eventDetailsToSave);
                    } else {
                        listUserCalendars();
                    }
                    return;
                }

                tokenClient.requestAccessToken({ prompt: 'consent' });
            };

            const listUserCalendars = async () => {
                try {
                    const response = await gapi.client.calendar.calendarList.list();
                    const calendars = response.result.items.filter(c => c.accessRole === 'owner' || c.accessRole === 'writer');
                    showCalendarSelectModal(calendars, eventDetailsToSave);
                } catch (err) {
                    if (err.status === 401 || err.status === 403) {
                        renderSaveErrorUI("Sessione scaduta. Riprova.", () => tokenClient.requestAccessToken({ prompt: '' }));
                    } else {
                        renderSaveErrorUI("Errore lista calendari.", () => listUserCalendars());
                    }
                }
            };

            const showCalendarSelectModal = (calendars, eventDetails) => {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
                const options = calendars.map(c => `<option value="${c.id}">${c.summary}</option>`).join('');
                modal.innerHTML = `
                    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm mx-4">
                        <p class="text-gray-800 mb-2 font-semibold">Scegli un calendario</p>
                        <select id="calendar-select" class="w-full p-2 border rounded-md mb-4">${options}</select>
                        <div class="flex justify-end space-x-2">
                            <button id="modal-cancel" class="px-4 py-2 rounded-md text-gray-700 bg-gray-200 hover:bg-gray-300">Annulla</button>
                            <button id="modal-confirm" class="px-4 py-2 rounded-md text-white bg-blue-600 hover:bg-blue-700">Salva Evento</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                const close = () => document.body.removeChild(modal);
                document.getElementById('modal-confirm').addEventListener('click', () => {
                    const calId = document.getElementById('calendar-select').value;
                    createCalendarEvent(calId, eventDetails);
                    close();
                });
                document.getElementById('modal-cancel').addEventListener('click', () => { close(); resetTimerUI(); });
            };

            const createCalendarEvent = async (calendarId, { startTime, endTime, title }) => {
                const calAction = document.getElementById('calendar-action');
                if (calAction) calAction.innerHTML = `<p class="text-sm text-blue-600 animate-pulse">Salvataggio in corso...</p>`;

                const event = {
                    summary: title,
                    start: { dateTime: toLocalISOString(startTime), timeZone: 'Europe/Rome' },
                    end:   { dateTime: toLocalISOString(endTime),   timeZone: 'Europe/Rome' }
                };
                try {
                    await gapi.client.calendar.events.insert({ calendarId, resource: event });
                    await saveGlobalSetting('preferredCalendarId', calendarId);

                    if (calAction) {
                        calAction.innerHTML = `
                            <div class="flex items-center gap-2 text-green-700 font-semibold text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                Evento salvato nel calendario!
                            </div>`;
                    }
                    setTimeout(resetTimerUI, 3000);
                } catch (err) {
                    if (err.status === 401) {
                        renderSaveErrorUI("Sessione scaduta.", () => tokenClient.requestAccessToken({ prompt: '' }));
                    } else {
                        renderSaveErrorUI("Errore salvataggio evento.", () => createCalendarEvent(calendarId, { startTime, endTime, title }));
                    }
                }
            };

            // ─── Auth State ───────────────────────────────────────────────

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    updateAuthUI(user);
                    setupSequencesListener();
                    setupGlobalSettingsListener();
                    initializeGoogleApis();
                } else {
                    signInAnonymously(auth).catch(e => showErrorToast("Errore avvio sessione: " + e.message));
                }
            });

            // ─── Event Listeners ──────────────────────────────────────────

            startPauseBtn.addEventListener('click', handleStartPauseClick);
            nextBtn.addEventListener('click', handleNextClick);
            backBtn.addEventListener('click', handleBackClick);
            addSequenceBtn.addEventListener('click', handleAddSequence);

            sequencesContainer.addEventListener('click', async (e) => {
                const detailsEl = e.target.closest('details');
                if (!detailsEl) return;
                const sequenceId = detailsEl.dataset.sequenceId;
                const sequence   = allSequences.find(s => s.id === sequenceId);
                if (!sequence) return;

                if (e.target.classList.contains('activate-toggle')) {
                    await handleActivateSequence(sequenceId);
                    return;
                }

                if (e.target.closest('.delete-sequence-btn')) {
                    showConfirmationModal(
                        `Cancellare la sequenza "<strong>${sequence.title}</strong>"? L'azione è irreversibile.`,
                        () => handleDeleteSequence(sequenceId)
                    );
                    return;
                }

                const editBtn = e.target.closest('.edit-title-btn');
                if (editBtn) {
                    e.preventDefault(); e.stopPropagation();
                    const titleContainer = detailsEl.querySelector('.sequence-title-container');

                    if (sequence.isEditingTitle) {
                        const input    = titleContainer.querySelector('input');
                        const newTitle = input?.value.trim() || sequence.title;
                        try {
                            await updateDoc(doc(db, `users/${userId}/sequences/${sequenceId}`), { title: newTitle });
                        } catch (err) {
                            showErrorToast("Errore aggiornamento titolo: " + err.message);
                        }
                        sequence.isEditingTitle = false;
                        titleContainer.innerHTML = `<span class="sequence-title truncate">${newTitle}</span>`;
                        editBtn.innerHTML = pencilIcon;
                    } else {
                        allSequences.forEach(s => s.isEditingTitle = false);
                        renderSequencesUI();

                        const newDetailsEl     = sequencesContainer.querySelector(`details[data-sequence-id="${sequenceId}"]`);
                        const newTitleContainer = newDetailsEl.querySelector('.sequence-title-container');
                        const newEditBtn       = newDetailsEl.querySelector('.edit-title-btn');

                        sequence.isEditingTitle = true;
                        newTitleContainer.innerHTML = `<input type="text" class="text-sm font-medium bg-white border rounded px-1 -my-1 w-full" value="${sequence.title}">`;
                        newEditBtn.innerHTML = checkIcon;
                        newTitleContainer.querySelector('input').focus();
                    }
                    return;
                }

                if (e.target.closest('.add-exercise-btn')) {
                    try {
                        await addDoc(collection(db, `users/${userId}/sequences/${sequenceId}/exercises`), {
                            title: 'Nuovo Esercizio', duration: 10, comment: '',
                            order: sequence.exercises.length, createdAt: serverTimestamp()
                        });
                    } catch (err) {
                        showErrorToast("Errore aggiunta esercizio: " + err.message);
                    }
                    return;
                }

                const exerciseRow = e.target.closest('div[data-exercise-id]');
                if (!exerciseRow) return;
                const exerciseId = exerciseRow.dataset.exerciseId;

                if (e.target.closest('.delete-btn')) {
                    try {
                        await deleteDoc(doc(db, `users/${userId}/sequences/${sequenceId}/exercises/${exerciseId}`));
                    } catch (err) {
                        showErrorToast("Errore eliminazione esercizio: " + err.message);
                    }
                    return;
                }

                const moveBtn = e.target.closest('.move-btn');
                if (moveBtn) {
                    const direction   = moveBtn.dataset.direction;
                    const curIdx      = sequence.exercises.findIndex(ex => ex.id === exerciseId);
                    const targetIdx   = direction === 'up' ? curIdx - 1 : curIdx + 1;
                    if (targetIdx >= 0 && targetIdx < sequence.exercises.length) {
                        try {
                            const batch  = writeBatch(db);
                            const curRef = doc(db, `users/${userId}/sequences/${sequenceId}/exercises/${exerciseId}`);
                            const tgtRef = doc(db, `users/${userId}/sequences/${sequenceId}/exercises/${sequence.exercises[targetIdx].id}`);
                            batch.update(curRef, { order: sequence.exercises[targetIdx].order });
                            batch.update(tgtRef, { order: sequence.exercises[curIdx].order });
                            await batch.commit();
                        } catch (err) {
                            showErrorToast("Errore spostamento esercizio: " + err.message);
                        }
                    }
                }
            });

            sequencesContainer.addEventListener('change', async (e) => {
                const detailsEl = e.target.closest('details');
                if (!detailsEl) return;
                const sequenceId = detailsEl.dataset.sequenceId;

                if (e.target.classList.contains('setting-toggle')) {
                    await updateSetting(sequenceId, e.target.dataset.setting, e.target.checked);
                }

                if (e.target.classList.contains('setting-input')) {
                    let value = parseInt(e.target.value, 10);
                    if (e.target.dataset.setting === 'breakDuration') {
                        if (isNaN(value) || value < 5)  value = 5;
                        if (value > 120) value = 120;
                        e.target.value = value;
                    }
                    await updateSetting(sequenceId, e.target.dataset.setting, value);
                }

                const exerciseRow = e.target.closest('div[data-exercise-id]');
                if (exerciseRow) {
                    const exerciseId = exerciseRow.dataset.exerciseId;
                    const field      = e.target.dataset.field;
                    const value      = e.target.type === 'number' ? (parseInt(e.target.value) || 1) : e.target.value;
                    try {
                        await updateDoc(doc(db, `users/${userId}/sequences/${sequenceId}/exercises/${exerciseId}`), { [field]: value });
                    } catch (err) {
                        showErrorToast("Errore aggiornamento campo: " + err.message);
                    }
                }
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () =>
                    navigator.serviceWorker.register('sw.js')
                        .then(() => console.log('SW registrato'))
                        .catch(e => console.warn('Errore SW:', e))
                );
            }
        });
    </script>
</body>
</html>
