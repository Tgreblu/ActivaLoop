<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActivaLoop</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    #loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255,255,255,0.9); display: flex;
      align-items: center; justify-content: center; z-index: 50;
      transition: opacity 0.3s;
    }
    .details-summary::-webkit-details-marker { display: none; }
    .details-summary { list-style: none; }
  </style>
</head>

<body class="bg-gray-100 flex justify-center items-start min-h-screen p-4 sm:p-8">
  <div id="main-wrapper" class="w-full max-w-[600px] space-y-4">
    <div id="loading-overlay">
      <p id="loading-text" class="text-gray-600">Sincronizzazione dati...</p>
    </div>

    <!-- Blocco Superiore: Timer -->
    <div id="timer-block" class="bg-white rounded-2xl shadow-xl p-10 border border-gray-200 relative">
      <div id="auth-container" class="absolute top-4 right-4 text-sm z-10"></div>
      <div class="text-center">
        <h1 id="exercise-title"
            class="text-3xl font-bold text-gray-800 min-h-[5rem] flex items-center justify-center">ActivaLoop</h1>

        <div id="countdown-container" class="my-2 min-h-[5rem] flex items-center justify-center flex-col">
          <p id="countdown-display" class="text-7xl font-bold text-blue-600">00:00</p>
        </div>

        <div class="flex justify-center items-center space-x-4 mb-2">
          <button id="back-btn"
                  class="p-3 rounded-full bg-gray-200 hover:bg-gray-300 text-gray-700 transition-all duration-200"></button>
          <button id="start-pause-btn"
                  class="w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md">START</button>
          <button id="next-btn"
                  class="p-3 rounded-full bg-gray-200 hover:bg-gray-300 text-gray-700 transition-all duration-200"></button>
        </div>

        <p class="text-sm text-gray-500 h-5">Prossimo: <span id="next-exercise-label"></span></p>
      </div>
    </div>

    <!-- Blocco Inferiore: Sequenze -->
    <div id="sequences-block" class="bg-white rounded-2xl shadow-xl p-6 border border-gray-200 relative">
      <div id="sequences-container" class="space-y-2"></div>
      <div class="flex justify-center mt-4">
        <button id="add-sequence-btn" class="bg-blue-600 text-white rounded-full p-2 hover:bg-blue-700 shadow-lg transition z-10">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, linkWithPopup }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp,
      writeBatch, setDoc, getDocs, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /**
     * NOTE IMPORTANTISSIME (non “codice”, ma requisiti):
     * 1) Nel tuo OAuth Client (Google Cloud Console) devi avere:
     *    - Authorized JavaScript origins: il dominio dove gira l’app (es. https://activaloop.web.app)
     * 2) Nel progetto GCP associato devi avere abilitata Google Calendar API.
     * 3) Se usi API key con restrizioni HTTP referrers, includi il dominio corretto.
     */

    // --- CONFIGURAZIONE GOOGLE ---
    const GOOGLE_CLIENT_ID = "5835049539-efmqgkk3fmuesj0v0u6nlkf2duv6urbq.apps.googleusercontent.com";
    const GOOGLE_API_KEY = "AIzaSyAoSqwkSoatQLABaTL17EnU4pA40kcWonY";

    const firebaseConfig = {
      apiKey: GOOGLE_API_KEY,
      authDomain: "activaloop.firebaseapp.com",
      projectId: "activaloop",
      storageBucket: "activaloop.firebasestorage.app",
      messagingSenderId: "5835049539",
      appId: "1:5835049539:web:2f21359a22019414a762f6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let unsubscribeFromSequences;
    let unsubscribeFromGlobalSettings;
    let exerciseUnsubscribers = new Map();

    // Google Calendar (GAPI + GIS)
    let tokenClient;
    let eventDetailsToSave = null;
    let preferredCalendarId = "primary";
    let gapiReady = false;
    let gisReady = false;

    // ---- Util: ISO locale con offset corretto
    const toLocalISOString = (date) => {
      const tzo = -date.getTimezoneOffset();
      const dif = tzo >= 0 ? '+' : '-';
      const pad = (num) => (num < 10 ? '0' : '') + num;
      return date.getFullYear() +
        '-' + pad(date.getMonth() + 1) +
        '-' + pad(date.getDate()) +
        'T' + pad(date.getHours()) +
        ':' + pad(date.getMinutes()) +
        ':' + pad(date.getSeconds()) +
        dif + pad(Math.floor(Math.abs(tzo) / 60)) +
        ':' + pad(Math.abs(tzo) % 60);
    };

    const loadScript = (src) => new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.defer = true;
      script.onload = resolve;
      script.onerror = reject;
      document.body.appendChild(script);
    });

    const logGapiError = (context, err) => {
      console.group(context);
      console.log("raw err:", err);
      console.log("status:", err?.status);
      console.log("message:", err?.message);
      console.log("result:", err?.result);
      console.log("result.error:", err?.result?.error);
      console.log("result.error.message:", err?.result?.error?.message);
      console.log("body:", err?.body);
      console.groupEnd();

      alert(`${context}\n\n` + JSON.stringify({
        status: err?.status,
        message: err?.message,
        apiMessage: err?.result?.error?.message,
        body: err?.body
      }, null, 2));
    };

    const ensureCalendarReady = async () => {
      if (!gapiReady) throw new Error("GAPI non inizializzata");
      if (!gapi.client.calendar) {
        await gapi.client.load("calendar", "v3");
      }
    };

    const initializeGoogleApis = async () => {
      const loadingOverlay = document.getElementById("loading-overlay");
      try {
        // 1) GAPI
        await loadScript("https://apis.google.com/js/api.js");
        await new Promise((resolve) => gapi.load("client", resolve));

        await gapi.client.init({
          apiKey: GOOGLE_API_KEY,
          discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest"],
        });

        // forza load calendario
        await gapi.client.load("calendar", "v3");
        gapiReady = true;

        // 2) GIS
        await loadScript("https://accounts.google.com/gsi/client");
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly",
          callback: async (tokenResponse) => {
            if (tokenResponse?.access_token) {
              gapi.client.setToken({ access_token: tokenResponse.access_token });

              // riprendi il flusso se c'è una richiesta in sospeso
              if (eventDetailsToSave) {
                try {
                  await ensureCalendarReady();
                  if (eventDetailsToSave.isAuto && preferredCalendarId) {
                    await createCalendarEvent(preferredCalendarId, eventDetailsToSave);
                  } else {
                    await listUserCalendars();
                  }
                } catch (err) {
                  logGapiError("Errore dopo token", err);
                }
              }
            } else {
              alert("Errore autorizzazione Google: " + (tokenResponse?.error || "sconosciuto"));
            }
          },
        });

        gisReady = true;
        console.log("Google APIs ready");
      } catch (error) {
        console.error("Errore inizializzazione Google APIs:", error);
        if (loadingOverlay) {
          loadingOverlay.style.opacity = "0";
          loadingOverlay.style.pointerEvents = "none";
        }
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      const authContainer = document.getElementById("auth-container");
      const titleEl = document.getElementById("exercise-title");
      const countdownContainer = document.getElementById("countdown-container");
      const startPauseBtn = document.getElementById("start-pause-btn");
      const nextBtn = document.getElementById("next-btn");
      const backBtn = document.getElementById("back-btn");
      const nextExerciseLabel = document.getElementById("next-exercise-label");
      const sequencesContainer = document.getElementById("sequences-container");
      const addSequenceBtn = document.getElementById("add-sequence-btn");
      const loadingOverlay = document.getElementById("loading-overlay");

      let allSequences = [];
      let currentExerciseIndex = 0;
      let timeLeft = 0;
      let timerInterval = null;
      let isPaused = true;
      let isBreakTime = false;
      let commentTimeout = null;
      let wakeLock = null;

      const pencilIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`;
      const endSound = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YS9vT18DAAAAAAABAgMEBQYHCAkKCwwNDg8QERITFBUWFxgZGhscHR4fICEiIyQlJicoKSorLC0uLzAxMjM0NTY3ODk6Ozw9Pj9AQUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVpbXF1eX2BhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5enx9fn+AgYKDhIWGh4iJiouMjY6PkJGSk5SVlpeYmZqbnJ2en6ChoqOkpaanqKmqq6ytrq+wsbKztLW2t7i5uru8vb6/wMHCw8TFxsfIycrLzM3Oz9DR0tPU1dbX2Nna29zd3t/g4eLj5OXm5+jp6uvs7e7v8PHy8/T19vf4+fr7/P3+/w==');

      backBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`;
      nextBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`;

      const requestWakeLock = async () => {
        if ('wakeLock' in navigator) {
          try { wakeLock = await navigator.wakeLock.request('screen'); }
          catch (err) { console.error(`${err.name}, ${err.message}`); }
        }
      };
      const releaseWakeLock = async () => {
        if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; }
      };

      const speakText = (text) => {
        if (!('speechSynthesis' in window) || !text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'it-IT';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      };

      const updateAuthUI = (user) => {
        authContainer.innerHTML = "";
        if (user && !user.isAnonymous) {
          authContainer.innerHTML =
            `<div class="flex items-center space-x-2">
              <span class="text-gray-600">Ciao, ${user.displayName?.split(' ')[0] || 'utente'}</span>
              <button id="logout-btn" class="font-semibold text-blue-600 hover:underline">Esci</button>
            </div>`;
          document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));
        } else {
          authContainer.innerHTML =
            `<button id="login-btn" class="bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded-md hover:bg-gray-50">
              Accedi con Google
            </button>`;
          document.getElementById("login-btn").addEventListener("click", signInWithGoogle);
        }
      };

      const signInWithGoogle = async () => {
        const provider = new GoogleAuthProvider();
        try {
          if (auth.currentUser && auth.currentUser.isAnonymous) {
            try { await linkWithPopup(auth.currentUser, provider); }
            catch (linkError) {
              if (linkError.code === "auth/credential-already-in-use") {
                await signOut(auth);
                await signInWithPopup(auth, provider);
              } else { throw linkError; }
            }
          } else {
            await signInWithPopup(auth, provider);
          }
        } catch (error) {
          console.error("Errore accesso Google:", error);
          alert("Errore login: " + error.message);
        }
      };

      const formatTime = (seconds) => `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
      const getActiveSequence = () => allSequences.find(s => s.isActive);

      const resetTimerUI = () => {
        countdownContainer.innerHTML = `<p id="countdown-display" class="text-7xl font-bold text-blue-600">${formatTime(0)}</p>`;
        updateUI();
      };

      const updateUI = () => {
        const activeSequence = getActiveSequence();
        if (!activeSequence || !activeSequence.exercises || activeSequence.exercises.length === 0) {
          titleEl.textContent = activeSequence ? activeSequence.title : "ActivaLoop";
          const cd = document.getElementById("countdown-display");
          if (cd) cd.textContent = formatTime(0);
          nextExerciseLabel.textContent = "";
          startPauseBtn.textContent = "START";
          startPauseBtn.className = "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md";
          return;
        }

        const countdownDisplay = document.getElementById("countdown-display");
        if (!countdownDisplay) return;

        if (isBreakTime) {
          titleEl.textContent = "Pausa";
          countdownDisplay.classList.remove("text-blue-600");
          countdownDisplay.classList.add("text-green-600");
          nextExerciseLabel.textContent = activeSequence.exercises[currentExerciseIndex + 1]?.title || "Ricomincia";
        } else {
          const exercise = activeSequence.exercises[currentExerciseIndex];
          if (!exercise) return;
          titleEl.textContent = exercise.title;
          countdownDisplay.classList.remove("text-green-600");
          countdownDisplay.classList.add("text-blue-600");
          nextExerciseLabel.textContent = activeSequence.exercises[currentExerciseIndex + 1]?.title || "Ricomincia";
        }

        countdownDisplay.textContent = formatTime(Math.max(0, timeLeft));
        startPauseBtn.textContent = isPaused ? "START" : "PAUSE";
        startPauseBtn.className = isPaused
          ? "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 shadow-md"
          : "w-32 text-xl font-semibold py-3 px-6 rounded-lg bg-gray-500 text-white hover:bg-gray-600 transition-all duration-200 shadow-md";

        backBtn.style.visibility = currentExerciseIndex > 0 ? "visible" : "hidden";
        nextBtn.style.visibility = (activeSequence?.exercises?.length && currentExerciseIndex < activeSequence.exercises.length - 1) ? "visible" : "hidden";
      };

      const setupExercise = (index, shouldSpeak = false) => {
        resetTimerUI();
        const activeSequence = getActiveSequence();
        if (!activeSequence || !activeSequence.exercises || activeSequence.exercises.length === 0) return;
        if (index >= activeSequence.exercises.length || index < 0) return;

        window.speechSynthesis.cancel();
        if (commentTimeout) clearTimeout(commentTimeout);

        isBreakTime = false;
        currentExerciseIndex = index;
        const currentExercise = activeSequence.exercises[currentExerciseIndex];
        timeLeft = currentExercise?.duration || 0;
        updateUI();

        if (shouldSpeak && activeSequence.settings?.speechEnabled) {
          speakText(currentExercise.title);
          if (activeSequence.settings?.commentSpeechEnabled && currentExercise.comment?.trim()) {
            commentTimeout = setTimeout(() => {
              if (!isPaused) speakText(currentExercise.comment);
            }, 3000);
          }
        }
      };

      const pauseTimer = async () => {
        isPaused = true;
        if (timerInterval) clearInterval(timerInterval);
        if (commentTimeout) clearTimeout(commentTimeout);
        window.speechSynthesis.cancel();
        timerInterval = null;
        await releaseWakeLock();
        updateUI();
      };

      const startTimer = async () => {
        resetTimerUI();
        await requestWakeLock();
        const activeSequence = getActiveSequence();
        if (!activeSequence) return;

        if (isPaused && !isBreakTime && timeLeft === (activeSequence.exercises[currentExerciseIndex]?.duration || 0)) {
          setupExercise(currentExerciseIndex, true);
        }

        isPaused = false;
        updateUI();

        timerInterval = setInterval(async () => {
          timeLeft--;

          if (timeLeft < 0) {
            timeLeft = 0;
            if (isBreakTime) {
              setupExercise(currentExerciseIndex + 1, true);
            } else {
              endSound?.play?.().catch(e => console.error("Errore audio:", e));

              if (currentExerciseIndex < activeSequence.exercises.length - 1) {
                isBreakTime = true;
                timeLeft = activeSequence.settings?.breakDuration ?? 5;
                updateUI();
              } else {
                await pauseTimer();
                isBreakTime = false;
                handleSequenceCompletion(activeSequence);
                return;
              }
            }
          } else {
            updateUI();
          }
        }, 1000);
      };

      const handleStartPauseClick = async () => {
        const activeSequence = getActiveSequence();
        if (!activeSequence?.exercises?.length) return;

        const openDetails = sequencesContainer.querySelector('details[open]');
        if (openDetails) return;

        if (isPaused && timeLeft <= 0 && currentExerciseIndex >= activeSequence.exercises.length - 1 && !isBreakTime) {
          setupExercise(0, true);
        }

        isPaused ? await startTimer() : await pauseTimer();
      };

      const handleNextClick = async () => {
        const activeSequence = getActiveSequence();
        if (!activeSequence) return;
        await pauseTimer();
        if (currentExerciseIndex < activeSequence.exercises.length - 1) setupExercise(currentExerciseIndex + 1, true);
      };

      const handleBackClick = async () => {
        const activeSequence = getActiveSequence();
        if (!activeSequence) return;
        await pauseTimer();
        if (currentExerciseIndex > 0) setupExercise(currentExerciseIndex - 1, true);
      };

      // ---- Firestore: global settings
      const setupGlobalSettingsListener = () => {
        if (unsubscribeFromGlobalSettings) unsubscribeFromGlobalSettings();
        const settingsRef = doc(db, `users/${userId}/settings/main`);
        unsubscribeFromGlobalSettings = onSnapshot(settingsRef, (d) => {
          if (d.exists()) preferredCalendarId = d.data()?.preferredCalendarId || "primary";
        });
      };

      const saveGlobalSetting = async (key, value) => {
        if (!userId) return;
        const settingsRef = doc(db, `users/${userId}/settings/main`);
        await setDoc(settingsRef, { [key]: value }, { merge: true });
      };

      // ---- Firestore: sequences + exercises
      const setupExercisesListener = (sequenceId) => {
        const exercisesRef = collection(db, `users/${userId}/sequences/${sequenceId}/exercises`);
        const unsubscribe = onSnapshot(query(exercisesRef, orderBy("order")), (snapshot) => {
          const sequence = allSequences.find(s => s.id === sequenceId);
          if (!sequence) return;

          sequence.exercises = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

          const activeSequence = getActiveSequence();
          if (activeSequence && activeSequence.id === sequenceId && isPaused) {
            setupExercise(currentExerciseIndex, false);
          }

          const totalDurationEl = document.querySelector(`details[data-sequence-id="${sequenceId}"] .total-duration`);
          if (totalDurationEl) {
            const exDur = sequence.exercises.reduce((sum, ex) => sum + (ex.duration || 0), 0);
            const breakTotal = (sequence.exercises.length > 1) ? (sequence.exercises.length - 1) * (sequence.settings?.breakDuration ?? 5) : 0;
            totalDurationEl.textContent = `(${formatTime(exDur + breakTotal)})`;
          }

          const exerciseListEl = document.querySelector(`details[data-sequence-id="${sequenceId}"] .exercise-list`);
          if (exerciseListEl) renderExerciseList(exerciseListEl, sequence.exercises);
        });

        exerciseUnsubscribers.set(sequenceId, unsubscribe);
      };

      const renderSequencesUI = () => {
        sequencesContainer.innerHTML = "";
        allSequences.forEach(seq => {
          const details = document.createElement("details");
          details.className = "bg-white rounded-lg border";
          details.dataset.sequenceId = seq.id;

          details.innerHTML = `
            <summary class="details-summary cursor-pointer p-2 text-sm font-medium text-gray-700 list-none flex justify-between items-center bg-gray-100 rounded-t-lg">
              <div class="flex items-center space-x-2 flex-grow min-w-0">
                <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
                  <input type="checkbox" ${seq.isActive ? "checked" : ""} class="sr-only peer activate-toggle">
                  <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
                <div class="sequence-title-container flex-grow truncate">
                  <span class="sequence-title truncate">${seq.title}</span>
                </div>
                <span class="total-duration text-xs text-gray-500 font-normal whitespace-nowrap"></span>
              </div>
              <div class="flex items-center space-x-2 flex-shrink-0">
                <button class="edit-title-btn p-1 rounded-full hover:bg-gray-200">${pencilIcon}</button>
                <svg class="w-4 h-4 transition-transform duration-200 transform details-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
              </div>
            </summary>
            <style> details[open] .details-arrow { transform: rotate(180deg); } </style>

            <div class="p-3 border-t flex justify-between items-center bg-gray-100">
              <span class="text-sm font-medium text-red-600">Cancella Sequenza</span>
              <button class="delete-sequence-btn p-1 rounded-full hover:bg-red-100 text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </div>

            <div class="p-3 border-t flex justify-between items-center bg-gray-100">
              <label class="text-sm font-medium text-gray-700">Salva nel calendario</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" ${seq.settings?.autoCalendarSave ? "checked" : ""} data-setting="autoCalendarSave" class="sr-only peer setting-toggle">
                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
              </label>
            </div>

            <div class="p-3 border-t flex justify-between items-center bg-gray-100">
              <label class="text-sm font-medium text-gray-700">Leggi titoli</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" ${seq.settings?.speechEnabled ? "checked" : ""} data-setting="speechEnabled" class="sr-only peer setting-toggle">
                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
              </label>
            </div>

            <div class="p-3 border-t flex justify-between items-center bg-gray-100">
              <label class="text-sm font-medium text-gray-700">Leggi commenti</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" ${seq.settings?.commentSpeechEnabled ? "checked" : ""} data-setting="commentSpeechEnabled" class="sr-only peer setting-toggle">
                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
              </label>
            </div>

            <div class="p-3 border-t flex justify-between items-center bg-gray-100">
              <label class="text-sm font-medium text-gray-700">Pausa (sec)</label>
              <input type="number" value="${seq.settings?.breakDuration ?? 5}" data-setting="breakDuration" min="5" max="120"
                     class="w-20 p-1 border rounded-md text-sm text-center setting-input">
            </div>

            <div class="exercise-list p-3 border-t bg-white"></div>

            <div class="p-2 border-t bg-gray-100 rounded-b-lg">
              <button class="add-exercise-btn w-full flex items-center justify-center py-1 text-sm text-blue-600 hover:bg-blue-100 rounded-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span class="ml-1">Aggiungi Riga</span>
              </button>
            </div>
          `;
          sequencesContainer.appendChild(details);
        });
      };

      const renderExerciseList = (container, exercises) => {
        container.innerHTML = "";
        exercises.forEach((exercise, index) => {
          const row = document.createElement("div");
          row.className = "flex items-start space-x-1 mb-2";
          row.dataset.exerciseId = exercise.id;

          row.innerHTML = `
            <div class="flex-grow">
              <input type="text" value="${exercise.title || ''}" placeholder="Titolo Esercizio" data-field="title"
                     class="w-full p-1 border rounded-md text-sm">
              <textarea placeholder="Aggiungi un commento..." data-field="comment"
                        class="w-full mt-1 p-1 border rounded-md text-xs h-10 resize-none">${exercise.comment || ''}</textarea>
            </div>
            <div class="flex-shrink-0 flex flex-col items-center space-y-1 pt-1">
              <input type="number" value="${exercise.duration || 0}" data-field="duration"
                     class="w-16 p-1 border rounded-md text-sm text-center">
              <div class="flex items-center">
                <button data-direction="up" class="move-btn p-1 text-gray-500 hover:bg-gray-200 rounded-full" ${index === 0 ? 'style="visibility: hidden;"' : ''}>
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m18 15-6-6-6 6"/>
                  </svg>
                </button>
                <button data-direction="down" class="move-btn p-1 text-gray-500 hover:bg-gray-200 rounded-full" ${index === exercises.length - 1 ? 'style="visibility: hidden;"' : ''}>
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m6 9 6 6 6-6"/>
                  </svg>
                </button>
                <button class="delete-btn p-1 text-red-500 hover:bg-red-100 rounded-full">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;
          container.appendChild(row);
        });
      };

      const updateSetting = async (sequenceId, settingKey, value) => {
        if (!userId) return;
        const seqRef = doc(db, `users/${userId}/sequences/${sequenceId}`);
        await updateDoc(seqRef, { [`settings.${settingKey}`]: value });
      };

      const handleAddSequence = async () => {
        const newSequence = {
          title: `Nuova Sequenza ${allSequences.length + 1}`,
          isActive: allSequences.length === 0,
          createdAt: serverTimestamp(),
          settings: { speechEnabled: true, commentSpeechEnabled: true, breakDuration: 5, autoCalendarSave: false }
        };
        const sequencesRef = collection(db, `users/${userId}/sequences`);
        const newDocRef = await addDoc(sequencesRef, newSequence);

        await addDoc(collection(db, `${newDocRef.path}/exercises`), {
          title: "Primo Esercizio", duration: 10, comment: "", order: 0, createdAt: serverTimestamp()
        });
      };

      const handleActivateSequence = async (sequenceIdToActivate) => {
        const batch = writeBatch(db);
        allSequences.forEach(seq => {
          const docRef = doc(db, `users/${userId}/sequences/${seq.id}`);
          batch.update(docRef, { isActive: seq.id === sequenceIdToActivate });
        });
        await batch.commit();
      };

      const saveGlobalSetting = async (key, value) => {
        if (!userId) return;
        const settingsRef = doc(db, `users/${userId}/settings/main`);
        await setDoc(settingsRef, { [key]: value }, { merge: true });
      };

      const handleSequenceCompletion = (sequence) => {
        titleEl.textContent = "Completato!";

        const exerciseSeconds = sequence.exercises.reduce((sum, ex) => sum + (ex.duration || 0), 0);
        const breakSeconds = (sequence.exercises.length > 1) ? (sequence.exercises.length - 1) * (sequence.settings?.breakDuration ?? 5) : 0;
        const totalSeconds = exerciseSeconds + breakSeconds;

        const endTime = new Date();
        const startTime = new Date(endTime.getTime() - totalSeconds * 1000);

        const saveCallback = (isAuto) => handleCalendarSaveRequest(startTime, endTime, sequence.title, isAuto);

        if (sequence.settings?.autoCalendarSave) {
          countdownContainer.innerHTML = `<p class="text-xl font-semibold text-blue-600">Salvataggio in corso...</p>`;
          saveCallback(true);
        } else {
          countdownContainer.innerHTML = `
            <button id="calendar-btn" class="text-lg font-semibold py-3 px-6 rounded-lg bg-green-600 text-white hover:bg-green-700 transition-all duration-200 shadow-md">
              Salva su Google Calendar
            </button>`;
          document.getElementById("calendar-btn").addEventListener("click", () => saveCallback(false));
        }
      };

      const renderSaveErrorUI = (errorMessage, retryCallback, skipCallback) => {
        countdownContainer.innerHTML = `
          <div class="flex flex-col items-center">
            <p class="text-red-600 font-bold mb-2 text-sm text-center">${errorMessage}</p>
            <div class="flex space-x-2">
              <button id="retry-save-btn" class="bg-blue-600 text-white px-4 py-2 rounded shadow text-sm">Riprova</button>
              <button id="skip-save-btn" class="bg-gray-300 text-gray-700 px-4 py-2 rounded shadow text-sm">Salta</button>
            </div>
          </div>
        `;
        document.getElementById("retry-save-btn").addEventListener("click", retryCallback);
        document.getElementById("skip-save-btn").addEventListener("click", skipCallback);
      };

      const requestToken = () => {
        const hasToken = gapi.client.getToken() !== null;
        tokenClient.requestAccessToken({ prompt: hasToken ? "" : "consent" });
      };

      const handleCalendarSaveRequest = async (startTime, endTime, title, isAuto) => {
        eventDetailsToSave = { startTime, endTime, title, isAuto };

        if (!gisReady || !gapiReady) {
          renderSaveErrorUI("API Google non pronte.", () => handleCalendarSaveRequest(startTime, endTime, title, isAuto), resetTimerUI);
          return;
        }

        try {
          await ensureCalendarReady();
        } catch (err) {
          renderSaveErrorUI("Calendar API non pronta.", () => handleCalendarSaveRequest(startTime, endTime, title, isAuto), resetTimerUI);
          return;
        }

        // se token già presente → vai
        if (gapi.client.getToken() !== null) {
          if (isAuto && preferredCalendarId) {
            await createCalendarEvent(preferredCalendarId, eventDetailsToSave);
          } else {
            await listUserCalendars();
          }
          return;
        }

        requestToken();
      };

      const listUserCalendars = async () => {
        try {
          await ensureCalendarReady();

          const response = await gapi.client.calendar.calendarList.list();
          const calendars = (response.result?.items || []).filter(cal =>
            cal.accessRole === "owner" || cal.accessRole === "writer"
          );

          showCalendarSelectModal(calendars, eventDetailsToSave);
        } catch (err) {
          logGapiError("Errore lista calendari", err);

          if (err?.status === 401 || err?.status === 403) {
            requestToken();
          } else {
            renderSaveErrorUI("Errore lista calendari.", () => listUserCalendars(), resetTimerUI);
          }
        }
      };

      const showCalendarSelectModal = (calendars, eventDetails) => {
        const modal = document.createElement("div");
        modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50";

        const options = calendars.length
          ? calendars.map(cal => `<option value="${cal.id}">${cal.summary}</option>`).join("")
          : `<option value="primary">Primary</option>`;

        modal.innerHTML = `
          <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm mx-4">
            <p class="text-gray-800 mb-2 font-semibold">Scegli un calendario</p>
            <select id="calendar-select" class="w-full p-2 border rounded-md mb-4">${options}</select>
            <div class="flex justify-end space-x-2">
              <button id="modal-cancel" class="px-4 py-2 rounded-md text-gray-700 bg-gray-200 hover:bg-gray-300">Annulla</button>
              <button id="modal-confirm" class="px-4 py-2 rounded-md text-white bg-blue-600 hover:bg-blue-700">Salva Evento</button>
            </div>
          </div>
        `;

        document.body.appendChild(modal);
        const closeModal = () => document.body.removeChild(modal);

        document.getElementById("modal-confirm").addEventListener("click", async () => {
          const calendarId = document.getElementById("calendar-select").value || "primary";
          closeModal();
          await createCalendarEvent(calendarId, eventDetails);
        });

        document.getElementById("modal-cancel").addEventListener("click", () => {
          closeModal();
          resetTimerUI();
        });

        modal.addEventListener("click", (e) => {
          if (e.target === modal) { closeModal(); resetTimerUI(); }
        });
      };

      const createCalendarEvent = async (calendarId, { startTime, endTime, title }) => {
        const event = {
          summary: title,
          start: { dateTime: toLocalISOString(startTime), timeZone: "Europe/Rome" },
          end: { dateTime: toLocalISOString(endTime), timeZone: "Europe/Rome" },
        };

        try {
          await ensureCalendarReady();

          const res = await gapi.client.calendar.events.insert({
            calendarId,
            resource: event,
          });

          // salva preferenza (se inserito ok)
          await saveGlobalSetting("preferredCalendarId", calendarId);

          titleEl.textContent = "Evento Salvato!";
          setTimeout(resetTimerUI, 3000);

          console.log("Evento creato:", res?.result);
        } catch (err) {
          logGapiError("Errore salvataggio evento", err);

          if (err?.status === 401 || err?.status === 403) {
            // token scaduto/non valido
            requestToken();
          } else {
            renderSaveErrorUI("Errore salvataggio.", () => createCalendarEvent(calendarId, { startTime, endTime, title }), resetTimerUI);
          }
        }
      };

      const setupSequencesListener = () => {
        if (unsubscribeFromSequences) unsubscribeFromSequences();
        const sequencesRef = collection(db, `users/${userId}/sequences`);

        unsubscribeFromSequences = onSnapshot(query(sequencesRef, orderBy("createdAt")), async (snapshot) => {
          if (snapshot.empty) {
            const newSequence = {
              title: "Sequenza Base",
              isActive: true,
              createdAt: serverTimestamp(),
              settings: { speechEnabled: true, commentSpeechEnabled: true, breakDuration: 5, autoCalendarSave: false }
            };
            const ref = await addDoc(collection(db, `users/${userId}/sequences`), newSequence);
            await addDoc(collection(db, ref.path, "exercises"), {
              title: "Primo Esercizio", duration: 10, comment: "", order: 0, createdAt: serverTimestamp()
            });
            return;
          }

          const newSequences = snapshot.docs.map(d => ({
            id: d.id,
            ...d.data(),
            exercises: allSequences.find(s => s.id === d.id)?.exercises || [],
            isEditingTitle: false
          }));

          if (newSequences.length > 0 && !newSequences.some(s => s.isActive)) {
            const batch = writeBatch(db);
            batch.update(doc(db, `users/${userId}/sequences/${newSequences[0].id}`), { isActive: true });
            await batch.commit();
            return;
          }

          allSequences = newSequences;
          renderSequencesUI();

          exerciseUnsubscribers.forEach(unsub => unsub());
          exerciseUnsubscribers.clear();
          allSequences.forEach(seq => setupExercisesListener(seq.id));

          if (loadingOverlay) {
            loadingOverlay.style.opacity = "0";
            loadingOverlay.style.pointerEvents = "none";
          }
        });
      };

      // ---- Auth
      onAuthStateChanged(auth, (user) => {
        if (user) {
          userId = user.uid;
          updateAuthUI(user);
          setupSequencesListener();
          setupGlobalSettingsListener();
          initializeGoogleApis();
        } else {
          signInAnonymously(auth).catch(error => console.error("Anonymous sign-in error:", error));
        }
      });

      // ---- listeners UI base
      startPauseBtn.addEventListener("click", handleStartPauseClick);
      nextBtn.addEventListener("click", handleNextClick);
      backBtn.addEventListener("click", handleBackClick);
      addSequenceBtn.addEventListener("click", handleAddSequence);

      // ---- wake lock restore
      document.addEventListener("visibilitychange", async () => {
        if (wakeLock !== null && document.visibilityState === "visible") {
          await requestWakeLock();
        }
      });

      // ---- service worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js")
            .then(() => console.log("SW registrato"))
            .catch(() => console.log("Errore SW"));
        });
      }

      // ---- NOTA: qui mancano volutamente i tuoi listener completi su sequencesContainer (edit/move/delete ecc.)
      // perché nel tuo snippet erano troncati con /* ... existing logic ... */
      // Il problema calendario sta nelle parti sopra: token, ensureCalendarReady e logging errori.
    });
  </script>
</body>
</html>
